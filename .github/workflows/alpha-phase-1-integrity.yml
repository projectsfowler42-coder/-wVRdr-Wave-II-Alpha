name: Alpha Integrity

on:
  push:
    branches:
      - alpha-phase-1-integrity-pass
      - alpha-phase-2-cockpit-bridge
  pull_request:
    branches:
      - main

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Build truth bridge
        run: go build ./packages/mdk/cmd/truth-bridge

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install packages
        run: pnpm install --no-frozen-lockfile

      - name: Wave-I typecheck
        run: pnpm --filter @workspace/wave-i typecheck

      - name: Wave-I build
        run: pnpm --filter @workspace/wave-i build

      - name: Cockpit typecheck
        run: pnpm --filter @wvrdr/wave-i-cockpit typecheck

      - name: Cockpit build
        run: pnpm --filter @wvrdr/wave-i-cockpit build
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8089
          VITE_PUBLIC_READ_TOKEN: ""

      - name: Start truth bridge
        run: |
          go run ./packages/mdk/cmd/truth-bridge > /tmp/truth-bridge.log 2>&1 &
          echo $! > /tmp/truth-bridge.pid
          sleep 2

      - name: Check health
        run: |
          curl --fail --silent http://127.0.0.1:8089/health | tee /tmp/health.json
          grep '"status": "ok"' /tmp/health.json

      - name: Check API health
        run: |
          curl --fail --silent http://127.0.0.1:8089/api/health | tee /tmp/api-health.json
          grep '"status": "ok"' /tmp/api-health.json
          grep '"mode": "READ_ONLY_DORMANT"' /tmp/api-health.json
          grep '"executionEligible": false' /tmp/api-health.json

      - name: Check truth envelope posture
        run: |
          curl --fail --silent http://127.0.0.1:8089/api/truth | tee /tmp/truth.json
          grep '"schema": "wvrdr.alpha.truth.v1"' /tmp/truth.json
          grep '"source": "SCHWAB"' /tmp/truth.json
          grep '"status": "DEGRADED"' /tmp/truth.json
          grep '"truthClass": "UNRESOLVED"' /tmp/truth.json
          grep '"executionEligible": false' /tmp/truth.json
          grep '"networkEnabled": false' /tmp/truth.json
          grep '"credentialsUsed": false' /tmp/truth.json

      - name: Check cockpit snapshot posture
        run: |
          curl --fail --silent http://127.0.0.1:8089/api/snapshot | tee /tmp/snapshot.json
          grep '"schema": "wvrdr.alpha.cockpit.snapshot.v1"' /tmp/snapshot.json
          grep '"name": "~wVRdr~ Wave-II~Alpha"' /tmp/snapshot.json
          grep '"mode": "DEGRADED"' /tmp/snapshot.json
          grep '"executionEligible": false' /tmp/snapshot.json
          grep '"Broker execution locked"' /tmp/snapshot.json

      - name: Check operator intent remains non-executing
        run: |
          curl --fail --silent \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{"kind":"ci_probe"}' \
            http://127.0.0.1:8089/api/operator/intent | tee /tmp/operator-intent.json
          grep '"ok": true' /tmp/operator-intent.json
          grep '"status": "recorded_no_execution"' /tmp/operator-intent.json
          grep '"executionEligible": false' /tmp/operator-intent.json

      - name: Stop truth bridge
        if: always()
        run: |
          if [ -f /tmp/truth-bridge.pid ]; then kill $(cat /tmp/truth-bridge.pid) || true; fi
