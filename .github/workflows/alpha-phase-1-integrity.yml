name: Alpha Integrity

on:
  push:
    branches:
      - alpha-phase-1-integrity-pass
      - alpha-phase-2-cockpit-bridge
      - alpha-phase-3-local-run-proof
  pull_request:
    branches:
      - main

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Build truth bridge
        run: go build ./packages/mdk/cmd/truth-bridge

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install packages
        run: pnpm install --no-frozen-lockfile

      - name: Wave-I typecheck
        run: pnpm --filter @workspace/wave-i typecheck

      - name: Wave-I build
        run: pnpm --filter @workspace/wave-i build

      - name: Cockpit typecheck
        run: pnpm --filter @wvrdr/wave-i-cockpit typecheck

      - name: Cockpit build
        run: pnpm --filter @wvrdr/wave-i-cockpit build
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8089
          VITE_PUBLIC_READ_TOKEN: ""

      - name: Validate local run scripts
        run: |
          bash -n scripts/dev-bridge.sh
          bash -n scripts/dev-cockpit.sh
          bash -n scripts/check-local-proof.sh

      - name: Start truth bridge
        run: |
          go run ./packages/mdk/cmd/truth-bridge > /tmp/truth-bridge.log 2>&1 &
          echo $! > /tmp/truth-bridge.pid
          sleep 2

      - name: Check local proof script
        run: pnpm check:local-proof

      - name: Stop truth bridge
        if: always()
        run: |
          if [ -f /tmp/truth-bridge.pid ]; then kill $(cat /tmp/truth-bridge.pid) || true; fi
