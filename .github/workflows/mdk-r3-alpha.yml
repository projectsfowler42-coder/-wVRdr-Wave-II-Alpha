name: MDK R3 Alpha Sentinel

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mdk-r3-alpha:
    name: MDK R3 Alpha Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Wave-II Alpha MDK Sentinel
        run: node scripts/mdk-security-sentinel.mjs .
